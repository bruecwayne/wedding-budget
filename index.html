<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever Budget — Wedding Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FAF6F0;
  --cream-dark: #EDE4D9;
  --charcoal: #2C2420;
  --charcoal-soft: #5A4E48;
  --groom: #C4956A;
  --groom-dark: #9B6B47;
  --bride: #C4607A;
  --bride-dark: #9B3D5A;
  --white: #FFFFFF;
  --shadow-md: 0 6px 30px rgba(44,36,32,0.14);
  --shadow-lg: 0 12px 50px rgba(44,36,32,0.2);
  --radius: 20px;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(150deg, #2C2420 0%, #3D3028 55%, #2C2420 100%);
  color: var(--cream);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
  position: relative;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 70% at 15% 50%, rgba(196,149,106,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 85% 50%, rgba(196,96,122,0.12) 0%, transparent 60%);
  pointer-events: none;
}

/* ── ORNAMENT ── */
.ornament-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  margin-bottom: 0.9rem;
}

.orn-line {
  height: 1px;
  width: 70px;
  background: linear-gradient(90deg, transparent, rgba(196,149,106,0.7), transparent);
}

.orn-diamond {
  width: 5px; height: 5px;
  background: rgba(196,149,106,0.8);
  transform: rotate(45deg);
}

.orn-dot {
  width: 3px; height: 3px;
  background: rgba(196,149,106,0.4);
  border-radius: 50%;
}

/* ── HERO TEXT ── */
.hero {
  text-align: center;
  margin-bottom: 3.5rem;
  position: relative;
}

.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3rem, 8vw, 5.5rem);
  font-weight: 300;
  letter-spacing: 0.06em;
  line-height: 1.05;
}

.hero h1 em {
  font-style: italic;
  background: linear-gradient(135deg, var(--groom), var(--bride));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: 0.72rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: rgba(250,246,240,0.4);
  margin-top: 0.6rem;
  font-weight: 300;
}

/* ── CARDS ── */
.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  width: 100%;
  max-width: 560px;
  position: relative;
}

@media (max-width: 480px) {
  .cards { grid-template-columns: 1fr; max-width: 320px; }
}

.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 2.5rem 1.75rem 2rem;
  text-align: center;
  text-decoration: none;
  color: var(--charcoal);
  box-shadow: var(--shadow-md);
  transition: transform var(--transition), box-shadow var(--transition);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--accent);
  border-radius: 4px 4px 0 0;
}

.card::after {
  content: '';
  position: absolute;
  bottom: -40px; right: -40px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.05;
  transition: transform var(--transition), opacity var(--transition);
}

.card:hover::after {
  transform: scale(1.5);
  opacity: 0.08;
}

.card.groom { --accent: var(--groom); }
.card.bride { --accent: var(--bride); }

.card-emoji {
  font-size: 2.8rem;
  margin-bottom: 0.4rem;
  line-height: 1;
}

.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem;
  font-weight: 400;
  letter-spacing: 0.04em;
  line-height: 1.1;
}

.card-title em {
  font-style: italic;
  color: var(--accent);
}

.card-sub {
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--charcoal-soft);
  opacity: 0.6;
}

.card-btn {
  margin-top: 1.25rem;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.55rem 1.25rem;
  border-radius: 50px;
  background: var(--accent);
  color: white;
  font-weight: 500;
  box-shadow: 0 3px 12px rgba(0,0,0,0.15);
  transition: all var(--transition);
}

.card:hover .card-btn {
  transform: scale(1.04);
  box-shadow: 0 5px 18px rgba(0,0,0,0.2);
}

/* ── DIVIDER ── */
.divider {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 32px;
  height: 32px;
  background: var(--white);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  color: var(--charcoal-soft);
  box-shadow: 0 2px 8px rgba(44,36,32,0.2);
  z-index: 2;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}

@media (max-width: 480px) { .divider { display: none; } }

/* ── FOOTER NOTE ── */
.footer-note {
  margin-top: 2.5rem;
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  color: rgba(250,246,240,0.25);
  text-align: center;
}
</style>
</head>
<body>

<div class="hero">
  <div class="ornament-row">
    <div class="orn-line"></div>
    <div class="orn-dot"></div>
    <div class="orn-diamond"></div>
    <div class="orn-dot"></div>
    <div class="orn-line"></div>
  </div>
  <h1><em>Forever</em> Budget</h1>
  <p class="hero-sub">Wedding &amp; Engagement Planner</p>
</div>

<div class="cards">
  <a class="card bride" href="bride.html">
    <div class="card-emoji">👰</div>
    <div class="card-title"><em>Bride's</em> Planner</div>
    <div class="card-sub">Her expenses</div>
    <div class="card-btn">Open →</div>
  </a>

  <div class="divider">💍</div>

  <a class="card groom" href="groom.html">
    <div class="card-emoji">🤵</div>
    <div class="card-title"><em>Groom's</em> Planner</div>
    <div class="card-sub">His expenses</div>
    <div class="card-btn">Open →</div>
  </a>
</div>

<p class="footer-note">Each planner is password protected &amp; stores data separately.</p>

</body>
</html>
